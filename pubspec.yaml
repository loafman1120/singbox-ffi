name: singbox_ffi
description: Flutter FFI bindings and platform packaging for embedding the sing-box libbox core from Dart.
version: 0.1.3
repository: https://github.com/loafman1120/singbox-ffi
issue_tracker: https://github.com/loafman1120/singbox-ffi/issues
topics:
  - ffi
  - flutter-ffi
  - sing-box
  - proxy
  - networking

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
