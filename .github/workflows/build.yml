name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -buildvcs=false -trimpath
  DESKTOP_TAGS: with_gvisor,with_quic,with_wireguard,with_utls,with_naive_outbound,with_purego,with_clash_api,badlinkname,tfogo_checklinkname0
  ANDROID_TAGS: with_gvisor,with_quic,with_wireguard,with_utls,with_naive_outbound,with_purego,with_clash_api,badlinkname,tfogo_checklinkname0
  LDFLAGS: -s -w -buildid= -checklinkname=0

jobs:
  desktop:
    name: Desktop ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            runner: windows-2025
            goos: windows
            goarch: amd64
            output: build/singboxffi.dll
            header: build/singboxffi.h
            archive: build/singboxffi.a
            archive_header: build/singboxffi.h

          - target: linux-amd64
            runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            output: build/libsingboxffi.so
            header: build/libsingboxffi.h
            archive: build/libsingboxffi.a
            archive_header: build/libsingboxffi.h

          - target: linux-arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            output: build/libsingboxffi.so
            header: build/libsingboxffi.h
            archive: build/libsingboxffi.a
            archive_header: build/libsingboxffi.h

          - target: macos-amd64
            runner: macos-15-intel
            goos: darwin
            goarch: amd64
            output: build/libsingboxffi.dylib
            header: build/libsingboxffi.h
            archive: build/libsingboxffi.a
            archive_header: build/libsingboxffi.h

          - target: macos-arm64
            runner: macos-15
            goos: darwin
            goarch: arm64
            output: build/libsingboxffi.dylib
            header: build/libsingboxffi.h
            archive: build/libsingboxffi.a
            archive_header: build/libsingboxffi.h

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup MSYS2 UCRT64 GCC
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          msystem: UCRT64
          path-type: inherit
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Build shared library
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: gcc
        run: |
          $env:Path = "C:\msys64\ucrt64\bin;$env:Path"
          New-Item -ItemType Directory -Force build | Out-Null
          go build -buildmode=c-shared `
            -tags "$env:DESKTOP_TAGS" `
            -ldflags "$env:LDFLAGS" `
            -o "${{ matrix.output }}" .

      - name: Build static archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: gcc
        run: |
          $env:Path = "C:\msys64\ucrt64\bin;$env:Path"
          New-Item -ItemType Directory -Force build | Out-Null
          go build -buildmode=c-archive `
            -tags "$env:DESKTOP_TAGS" `
            -ldflags "$env:LDFLAGS" `
            -o "${{ matrix.archive }}" .

      - name: Build shared library
        if: runner.os != 'Windows'
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p build
          go build -buildmode=c-shared \
            -tags "${DESKTOP_TAGS}" \
            -ldflags "${LDFLAGS}" \
            -o "${{ matrix.output }}" .

      - name: Build static archive
        if: runner.os != 'Windows'
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p build
          go build -buildmode=c-archive \
            -tags "${DESKTOP_TAGS}" \
            -ldflags "${LDFLAGS}" \
            -o "${{ matrix.archive }}" .

      - name: Inspect artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem "${{ matrix.output }}", "${{ matrix.header }}", "${{ matrix.archive }}", "${{ matrix.archive_header }}" | Format-Table Name, Length, LastWriteTime
          Select-String -Path "${{ matrix.header }}" -Pattern "sb_version|sb_go_version|sb_init|sb_check_config|sb_free_string"

      - name: Inspect artifacts
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          ls -lh "${{ matrix.output }}" "${{ matrix.header }}" "${{ matrix.archive }}" "${{ matrix.archive_header }}"
          file "${{ matrix.output }}"
          grep -E "sb_version|sb_go_version|sb_init|sb_check_config|sb_free_string" "${{ matrix.header }}"

      - name: Upload shared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: singboxffi-${{ matrix.target }}
          path: |
            ${{ matrix.output }}
            ${{ matrix.header }}
          if-no-files-found: error

      - name: Upload static artifacts
        uses: actions/upload-artifact@v4
        with:
          name: singboxffi-${{ matrix.target }}-static
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive_header }}
          if-no-files-found: error

  android:
    name: Android ${{ matrix.target }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: android-arm64-v8a
            abi: arm64-v8a
            goarch: arm64
            goarm: ""
            cc: aarch64-linux-android

          - target: android-armeabi-v7a
            abi: armeabi-v7a
            goarch: arm
            goarm: "7"
            cc: armv7a-linux-androideabi

          - target: android-x86_64
            abi: x86_64
            goarch: amd64
            goarm: ""
            cc: x86_64-linux-android

          - target: android-x86
            abi: x86
            goarch: 386
            goarm: ""
            cc: i686-linux-android

    env:
      NDK_VERSION: 27.2.12479018
      ANDROID_API: "23"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Android NDK
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" "ndk;${NDK_VERSION}"
          sdkmanager_status="${PIPESTATUS[1]}"
          set -o pipefail
          if [ "${sdkmanager_status}" -ne 0 ]; then
            exit "${sdkmanager_status}"
          fi
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "${GITHUB_ENV}"

      - name: Build JNI shared library
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: android
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          set -euo pipefail
          export CC="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/${{ matrix.cc }}${ANDROID_API}-clang"
          mkdir -p "build/android/${{ matrix.abi }}"
          go build -buildmode=c-shared \
            -tags "${ANDROID_TAGS}" \
            -ldflags "${LDFLAGS}" \
            -o "build/android/${{ matrix.abi }}/libsingboxffi.so" .

      - name: Inspect artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -lh "build/android/${{ matrix.abi }}/libsingboxffi.so" "build/android/${{ matrix.abi }}/libsingboxffi.h"
          file "build/android/${{ matrix.abi }}/libsingboxffi.so"
          grep -E "sb_version|sb_go_version|sb_init|sb_check_config|sb_free_string" "build/android/${{ matrix.abi }}/libsingboxffi.h"

      - name: Upload shared artifacts
        uses: actions/upload-artifact@v4
        with:
          name: singboxffi-${{ matrix.target }}
          path: |
            build/android/${{ matrix.abi }}/libsingboxffi.so
            build/android/${{ matrix.abi }}/libsingboxffi.h
          if-no-files-found: error

  ios:
    name: iOS ${{ matrix.target }}
    runs-on: macos-15
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ios-arm64
            sdk: iphoneos
            goarch: arm64
            min_flag: -miphoneos-version-min=12.0
            out_dir: build/ios/iphoneos

          - target: ios-simulator-arm64
            sdk: iphonesimulator
            goarch: arm64
            min_flag: -mios-simulator-version-min=12.0
            out_dir: build/ios/iphonesimulator-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build static archive
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ios
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          sdk_path="$(xcrun --sdk "${{ matrix.sdk }}" --show-sdk-path)"
          export CC="$(xcrun --sdk "${{ matrix.sdk }}" --find clang)"
          export CGO_CFLAGS="-isysroot ${sdk_path} ${{ matrix.min_flag }}"
          export CGO_LDFLAGS="-isysroot ${sdk_path} ${{ matrix.min_flag }}"
          mkdir -p "${{ matrix.out_dir }}"
          go build -buildmode=c-archive \
            -tags "${DESKTOP_TAGS}" \
            -ldflags "${LDFLAGS}" \
            -o "${{ matrix.out_dir }}/libsingboxffi.a" .

      - name: Inspect artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -lh "${{ matrix.out_dir }}/libsingboxffi.a" "${{ matrix.out_dir }}/libsingboxffi.h"
          grep -E "sb_version|sb_go_version|sb_init|sb_check_config|sb_free_string" "${{ matrix.out_dir }}/libsingboxffi.h"

      - name: Upload static artifacts
        uses: actions/upload-artifact@v4
        with:
          name: singboxffi-${{ matrix.target }}-static
          path: |
            ${{ matrix.out_dir }}/libsingboxffi.a
            ${{ matrix.out_dir }}/libsingboxffi.h
          if-no-files-found: error

  package:
    name: Package Flutter plugin
    runs-on: macos-15
    needs:
      - desktop
      - android
      - ios
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded-artifacts

      - name: Setup Dart OIDC publishing
        uses: dart-lang/setup-dart@v1

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "${package_version}" != "${tag_version}" ]; then
            echo "pubspec version ${package_version} does not match release tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Assemble plugin artifacts
        shell: bash
        run: |
          set -euo pipefail

          copy_file() {
            local src="$1"
            local dst="$2"
            if [ ! -f "${src}" ]; then
              echo "missing ${src}" >&2
              exit 1
            fi
            mkdir -p "$(dirname "${dst}")"
            cp "${src}" "${dst}"
          }

          copy_file downloaded-artifacts/singboxffi-windows-amd64/singboxffi.dll windows/artifacts/x64/singboxffi.dll
          copy_file downloaded-artifacts/singboxffi-windows-amd64/singboxffi.h windows/artifacts/x64/singboxffi.h

          copy_file downloaded-artifacts/singboxffi-linux-amd64/libsingboxffi.so linux/artifacts/x86_64/libsingboxffi.so
          copy_file downloaded-artifacts/singboxffi-linux-amd64/libsingboxffi.h linux/artifacts/x86_64/libsingboxffi.h
          copy_file downloaded-artifacts/singboxffi-linux-arm64/libsingboxffi.so linux/artifacts/aarch64/libsingboxffi.so
          copy_file downloaded-artifacts/singboxffi-linux-arm64/libsingboxffi.h linux/artifacts/aarch64/libsingboxffi.h

          copy_file downloaded-artifacts/singboxffi-android-arm64-v8a/libsingboxffi.so android/src/main/jniLibs/arm64-v8a/libsingboxffi.so
          copy_file downloaded-artifacts/singboxffi-android-arm64-v8a/libsingboxffi.h android/src/main/jniLibs/arm64-v8a/libsingboxffi.h
          copy_file downloaded-artifacts/singboxffi-android-armeabi-v7a/libsingboxffi.so android/src/main/jniLibs/armeabi-v7a/libsingboxffi.so
          copy_file downloaded-artifacts/singboxffi-android-armeabi-v7a/libsingboxffi.h android/src/main/jniLibs/armeabi-v7a/libsingboxffi.h
          copy_file downloaded-artifacts/singboxffi-android-x86_64/libsingboxffi.so android/src/main/jniLibs/x86_64/libsingboxffi.so
          copy_file downloaded-artifacts/singboxffi-android-x86_64/libsingboxffi.h android/src/main/jniLibs/x86_64/libsingboxffi.h
          copy_file downloaded-artifacts/singboxffi-android-x86/libsingboxffi.so android/src/main/jniLibs/x86/libsingboxffi.so
          copy_file downloaded-artifacts/singboxffi-android-x86/libsingboxffi.h android/src/main/jniLibs/x86/libsingboxffi.h

          mkdir -p macos/Libraries
          lipo -create \
            downloaded-artifacts/singboxffi-macos-amd64/libsingboxffi.dylib \
            downloaded-artifacts/singboxffi-macos-arm64/libsingboxffi.dylib \
            -output macos/Libraries/libsingboxffi.dylib
          install_name_tool -id @rpath/libsingboxffi.dylib macos/Libraries/libsingboxffi.dylib

          mkdir -p ios/Frameworks
          mkdir -p build/package-headers/ios-arm64 build/package-headers/ios-simulator-arm64
          cp downloaded-artifacts/singboxffi-ios-arm64-static/libsingboxffi.h build/package-headers/ios-arm64/
          cp downloaded-artifacts/singboxffi-ios-simulator-arm64-static/libsingboxffi.h build/package-headers/ios-simulator-arm64/
          xcodebuild -create-xcframework \
            -library downloaded-artifacts/singboxffi-ios-arm64-static/libsingboxffi.a \
            -headers build/package-headers/ios-arm64 \
            -library downloaded-artifacts/singboxffi-ios-simulator-arm64-static/libsingboxffi.a \
            -headers build/package-headers/ios-simulator-arm64 \
            -output ios/Frameworks/singboxffi.xcframework

      - name: Validate package metadata
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get
          flutter pub publish --dry-run

      - name: Create package archives
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          package="singbox_ffi-${version}"
          mkdir -p dist "${package}"
          rsync -a \
            --exclude .git \
            --exclude downloaded-artifacts \
            --exclude dist \
            --exclude "${package}" \
            ./ "${package}/"
          zip -r "dist/${package}.zip" "${package}"
          tar -czf "dist/${package}.tar.gz" "${package}"
          rm -rf "${package}" downloaded-artifacts

      - name: Upload packaged plugin
        uses: actions/upload-artifact@v4
        with:
          name: singbox_ffi-flutter-plugin-package
          path: |
            dist/*.zip
            dist/*.tar.gz
          if-no-files-found: error

      - name: Upload package to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz

      - name: Publish to pub.dev
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: flutter pub publish --force
