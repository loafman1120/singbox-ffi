name: Build singbox-ffi

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Build DLL
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "1"
          $env:CC = "C:\msys64\ucrt64\bin\gcc.exe"
          $env:PATH = "C:\msys64\ucrt64\bin;$env:PATH"
          New-Item -ItemType Directory -Force build | Out-Null
          go build -trimpath -buildmode=c-shared `
            -tags "with_gvisor,with_quic,with_wireguard,with_utls,with_naive_outbound,with_purego,with_clash_api,badlinkname,tfogo_checklinkname0" `
            -ldflags "-s -w -buildid= -checklinkname=0" `
            -o build\singboxffi.dll .

      - uses: actions/upload-artifact@v4
        with:
          name: singbox-ffi-windows-x64
          path: |
            build/singboxffi.dll
            build/singboxffi.h
