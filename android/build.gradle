group = "io.github.loafman1120.singbox_ffi"
version = "0.1.3"

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath "com.android.tools.build:gradle:8.6.1"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

apply plugin: "com.android.library"

android {
    namespace = "io.github.loafman1120.singbox_ffi"
    compileSdk = flutter.compileSdkVersion

    defaultConfig {
        minSdk = 23
    }

    sourceSets {
        main {
            jniLibs.srcDirs = ["src/main/jniLibs"]
        }
    }
}
